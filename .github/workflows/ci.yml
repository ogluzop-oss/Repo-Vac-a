name: CI

# CI del proyecto: lint + validación i18n + SUITE DE PRUEBAS REAL (pytest sobre
# MariaDB). El job `tests` ejecuta de verdad las pruebas de BD/servicios/fiscal
# (el conftest las OMITIRÍA si no hubiera MariaDB; por eso se levanta el servicio).
# El build del .exe queda como plantilla comentada (fase posterior).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Lint con Ruff (no bloqueante por ahora) ────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar Ruff
        run: pip install ruff==0.8.4
      - name: Ruff check
        run: ruff check . --output-format=github
        continue-on-error: true   # informa sin bloquear; quitar cuando el código esté limpio

  # ── Validación de catálogos i18n (sin dependencias pesadas) ─
  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar JSON de idiomas y paridad es/en
        run: |
          python - <<'PY'
          import json, glob, sys
          def flat(d,p=""):
              o={}
              for k,v in d.items():
                  o.update(flat(v,p+k+".")) if isinstance(v,dict) else o.update({p+k:v})
              return o
          errores=[]
          for f in glob.glob("assets/lang/*.json"):
              try: json.load(open(f,encoding="utf-8"))
              except Exception as e: errores.append(f"{f}: {e}")
          es=flat(json.load(open("assets/lang/es.json",encoding="utf-8")))
          en=flat(json.load(open("assets/lang/en.json",encoding="utf-8")))
          faltan=sorted(set(es)-set(en))
          if faltan: errores.append(f"en.json no cubre {len(faltan)} claves de es.json: {faltan[:10]}")
          if errores:
              print("\n".join(errores)); sys.exit(1)
          print("i18n OK: JSON válidos y en.json cubre es.json")
          PY

  # ── Suite de pruebas real (pytest sobre MariaDB) ───────────
  tests:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: roottest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=20 --health-start-period=30s
    env:
      # El conftest fija DB_NAME=smart_manager_test; la BD se crea en el arranque.
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: roottest
      TEST_DB_NAME: smart_manager_test
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Librerías de sistema (Qt headless + pyzbar + pyodbc)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 libzbar0 unixodbc-dev libpulse0 mariadb-client
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Esperar a MariaDB (pymysql)
        run: |
          python - <<'PY'
          import time, pymysql, sys
          for i in range(30):
              try:
                  pymysql.connect(host="127.0.0.1", port=3306, user="root",
                                  password="roottest", connect_timeout=3).close()
                  print("MariaDB lista"); sys.exit(0)
              except Exception as e:
                  print(f"Esperando MariaDB ({i+1}): {e}"); time.sleep(3)
          sys.exit("MariaDB no respondió a tiempo")
          PY
      - name: Ejecutar la suite (pytest + cobertura)
        # Omitidos en CI por dependencia del entorno (se ejecutan en local):
        #  - 3 tests XSD (descargan esquemas W3C por red, inestables en CI)
        #  - test_rrhh_pdf_decomp (firma "golden" de flowables sensible al locale/formato del host)
        # El resto de la suite corre completa.
        run: |
          pytest \
            --ignore tests/integration/test_rrhh_pdf_decomp.py \
            --deselect tests/unit/test_verifactu_xml.py::test_alta_valida_contra_xsd \
            --deselect tests/unit/test_verifactu_xml.py::test_anulacion_valida_contra_xsd \
            --deselect tests/unit/test_verifactu_xml.py::test_lote_multiple_valida

  # ── CD: validación de migraciones + artefacto Docker del backend (OBS-8) ────
  # Prepara el despliegue continuo SIN desplegar automáticamente.
  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Deps mínimas para importar las migraciones (src.db.conexion)
        run: pip install pymysql python-dotenv DBUtils
      - name: Validar que las migraciones importan y están registradas
        run: |
          python - <<'PY'
          import importlib
          mods = importlib.import_module("src.database.migraciones").MODULOS
          assert mods == sorted(mods), "MODULOS debe estar ordenado"
          for m in mods:
              importlib.import_module(f"src.database.migraciones.{m}")
          print(f"OK {len(mods)} migraciones válidas y ordenadas")
          PY
      - name: Construir imagen Docker del backend (artefacto, sin desplegar)
        run: docker build -t smart-manager-backend:ci .

