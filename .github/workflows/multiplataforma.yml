name: Certificación Multi-OS

# BLOQUE 8.1 — Evidencia objetiva de compatibilidad en Windows, Ubuntu y macOS.
# No depende de MariaDB (los service containers solo existen en runners Linux), por lo que
# valida lo que SÍ es comprobable de forma idéntica en los tres SO: instalación de
# dependencias, compilación, init de Qt (offscreen), imports y los tests portables del
# Bloque 8. La suite completa con BD sigue corriendo en ci.yml (Ubuntu + MariaDB).
#
# Principio: nunca se marca PASS si el paso no se ejecutó (cada paso falla en rojo si falla).

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  certificar:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Librerías de sistema para Qt headless (solo Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Registrar entorno (SO / Python / Qt)
        shell: bash
        run: |
          echo "## Entorno de certificación" >> "$GITHUB_STEP_SUMMARY"
          echo "- SO runner: ${{ runner.os }} (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          python -c "import platform,sys;print('- Python:',sys.version.split()[0],platform.machine())" >> "$GITHUB_STEP_SUMMARY"
          python -c "from PyQt6.QtCore import QT_VERSION_STR,PYQT_VERSION_STR;print('- Qt:',QT_VERSION_STR,'/ PyQt6:',PYQT_VERSION_STR)" >> "$GITHUB_STEP_SUMMARY"

      - name: Compilación (portabilidad de sintaxis en todo el árbol)
        run: python -m compileall -q src

      - name: Inicialización de Qt + capa de portabilidad
        run: |
          python -c "import time; t=time.perf_counter(); \
          from PyQt6.QtWidgets import QApplication; app=QApplication([]); \
          from src.utils import plataforma, perfil_tactil; \
          from src.services.perifericos import escaner_universal; \
          print('Qt init OK en %.0f ms; SO=%s' % ((time.perf_counter()-t)*1000, plataforma.SISTEMA))"

      - name: Smoke de imports de ventanas clave (sin BD)
        run: |
          python -c "import importlib; \
          [importlib.import_module(m) for m in ['src.gui.tpv','src.gui.mostrar_stock','src.gui.sidebar_colapsable']]; \
          print('Imports GUI OK')"

      - name: Tests portables del Bloque 8 (deterministas, sin BD)
        run: python -m pytest tests/integration/test_plataforma_b8.py -q -p no:cacheprovider

      - name: Medición de arranque (benchmark reproducible)
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import time, importlib
          from PyQt6.QtWidgets import QApplication
          t=time.perf_counter(); app=QApplication([]); qt=(time.perf_counter()-t)*1000
          a=time.perf_counter(); importlib.import_module("src.gui.tpv"); tpv=(time.perf_counter()-a)*1000
          print(f"- Qt init: {qt:.0f} ms · import TPV: {tpv:.0f} ms")
          PY
