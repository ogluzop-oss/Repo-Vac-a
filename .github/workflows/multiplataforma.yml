name: Certificación Multi-OS

# BLOQUE 8.1 — Evidencia objetiva de PORTABILIDAD en Windows, Ubuntu y macOS.
#
# Alcance deliberado: valida lo que es idéntico y comprobable en los tres SO SIN depender
# de hardware, MariaDB ni de las dependencias pesadas (prophet, opencv, pyodbc, pyzbar…)
# que requieren toolchains/headers del sistema y no aportan a la certificación de portabilidad.
# La suite COMPLETA con BD sigue en ci.yml (Ubuntu + MariaDB).
#
# Se instala un set MÍNIMO con wheels en los 3 SO (PyQt6 + pytest + python-dotenv) y se ejerce:
#   - compileall de todo src (portabilidad de sintaxis, sin importar dependencias)
#   - init de Qt offscreen + capa de portabilidad (plataforma/perfil_tactil/escáner)
#   - tests deterministas del Bloque 8 (sin BD ni hardware)
# Principio: nunca se marca PASS si el paso no se ejecutó (cada paso falla en rojo si falla).

on:
  push:
    branches: [main, master, "feat/**", "fix/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  certificar:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash          # bash existe en los 3 runners → mismos comandos en Win/mac/Linux
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Librerías de sistema para Qt headless (solo Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Instalar dependencias mínimas (wheels en los 3 SO)
        run: |
          python -m pip install --upgrade pip
          pip install "PyQt6==6.9.1" pytest python-dotenv

      - name: Registrar entorno (SO / Python / Qt)
        run: |
          {
            echo "## Entorno de certificación";
            echo "- SO runner: ${{ runner.os }} (${{ matrix.os }})";
            python -c "import platform,sys;print('- Python:',sys.version.split()[0],platform.machine())";
            python -c "from PyQt6.QtCore import QT_VERSION_STR,PYQT_VERSION_STR;print('- Qt:',QT_VERSION_STR,'/ PyQt6:',PYQT_VERSION_STR)";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compilación de todo src (portabilidad de sintaxis)
        run: python -m compileall -q src

      - name: Init de Qt + capa de portabilidad multiplataforma
        run: |
          python - <<'PY'
          import time
          t = time.perf_counter()
          from PyQt6.QtWidgets import QApplication
          app = QApplication([])
          from src.utils import plataforma, perfil_tactil          # noqa: F401
          from src.services.perifericos import escaner_universal     # noqa: F401
          from src.services.perifericos import impresora             # noqa: F401
          from src.gui import escaner_qt                             # noqa: F401
          import assets.estilo_global                                # noqa: F401
          print("Qt init OK en %.0f ms · SO=%s · perfil=%s" % (
              (time.perf_counter()-t)*1000, plataforma.SISTEMA, perfil_tactil.perfil_actual()))
          PY

      - name: Tests portables del Bloque 8 (deterministas, sin BD ni hardware)
        # -o addopts="" anula el --cov=src de pyproject (no instalamos pytest-cov en el set mínimo).
        run: |
          python -m pytest -o addopts="" -q -p no:cacheprovider \
            tests/integration/test_plataforma_b8.py \
            tests/integration/test_escaner_qt_b8.py \
            tests/integration/test_impresora_b8.py

      - name: Benchmark reproducible (init Qt)
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import time
          from PyQt6.QtWidgets import QApplication
          t = time.perf_counter(); app = QApplication([]); qt = (time.perf_counter()-t)*1000
          print(f"- Qt init: {qt:.0f} ms")
          PY
