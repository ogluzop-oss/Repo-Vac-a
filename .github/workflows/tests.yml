name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    # Base de datos de pruebas (aislada): el guard de conftest exige que el nombre
    # termine en "_test". La crea/define el bootstrap respetando DB_NAME.
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: admin123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin123
      TEST_DB_NAME: smart_manager_test
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Librerías de sistema para PyQt6 (headless), pyzbar (zbar) y pyodbc.
      - name: Dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libzbar0 unixodbc-dev

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ejecutar pruebas (con cobertura)
        run: |
          python -m pytest --cov-fail-under=20 --cov-report=xml

      - name: Publicar informe de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          path: coverage.xml
          if-no-files-found: ignore
